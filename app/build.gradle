plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'com.gradleup.shadow' version '9.4.1'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // This dependency is used by the application.
    def boofcv_version = "1.2.0" // Replace with current version
    
    // Core image processing functionality
    implementation "org.boofcv:boofcv-core:${boofcv_version}"
    
    // Optional: Visualization and integration
    implementation "org.boofcv:boofcv-swing:${boofcv_version}"
    //implementation "org.boofcv:boofcv-webcamcapture:${boofcv_version}"
}

testing {
    suites {
        // Configure the built-in test suite
        test {
            // Use JUnit4 test framework
            useJUnit('4.13.2')
        }
    }
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'org.example.App'
}
